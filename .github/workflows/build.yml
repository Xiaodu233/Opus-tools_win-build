name: Opus Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install Cross-Compilation Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 pkg-config autoconf automake libtool make zip

      - name: Create Build Environment
        run: |
          mkdir -p ${{ github.workspace }}/local_dist
          mkdir -p build_output/Win64

      - name: Build libogg (Win64)
        run: |
          git clone --depth 1 https://github.com/xiph/ogg.git
          cd ogg
          ./autogen.sh
          ./configure --host=x86_64-w64-mingw32 \
                      --prefix=${{ github.workspace }}/local_dist \
                      --enable-static --disable-shared
          make -j$(nproc) && make install

      - name: Build libopus (Win64)
        run: |
          git clone --depth 1 https://github.com/xiph/opus.git opus-lib
          cd opus-lib
          ./autogen.sh
          ./configure --host=x86_64-w64-mingw32 \
                      --prefix=${{ github.workspace }}/local_dist \
                      --enable-static --disable-shared \
                      --enable-osce --enable-dred \
                      CFLAGS="-O2 -mavx2" || cat config.log
          make -j$(nproc) && make install

      - name: Build opus-tools (Win64)
        run: |
          git clone --depth 1 https://github.com/xiph/opus-tools.git
          cd opus-tools
          ./autogen.sh
          
          export PKG_CONFIG_PATH=${{ github.workspace }}/local_dist/lib/pkgconfig
          export LDFLAGS="-L${{ github.workspace }}/local_dist/lib"
          export CPPFLAGS="-I${{ github.workspace }}/local_dist/include"
          
          ./configure --host=x86_64-w64-mingw32 CFLAGS="-O2 -mavx2"
          make -j$(nproc)
          
          cp *.exe ${{ github.workspace }}/build_output/Win64/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@main
        with:
          name: opus-tools-win64
          path: build_output/
